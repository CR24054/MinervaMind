# PostgreSQL configuration
# Ajusta valores antes de ejecutar contra Postgres.

spring.datasource.url=jdbc:postgresql://localhost:5432/minervamind  
spring.datasource.username=postgres 
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Si quieres cargar un esquema inicial, activa este archivo y guarda el SQL en src/main/resources/db/schema.sql
